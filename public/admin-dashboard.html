<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Booking System</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="logo">
            <h2>Booking System</h2>
            <div id="orgNameSidebar" class="org-name-sidebar">Loading...</div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></li>
            <li class="nav-item" data-page="bookings"><span class="nav-icon">📋</span><span>Bookings</span></li> 
            <li class="nav-item" data-page="calendar"><span class="nav-icon">📅</span><span>Calendar</span></li>
            <li class="nav-item" data-page="customers"><span class="nav-icon">👥</span><span>Customers</span></li>
            <li class="nav-item" data-page="services"><span class="nav-icon">💼</span><span>Services</span></li>
            <li class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span>Settings</span></li>
            <li class="nav-item" data-page="logs"><span class="nav-icon">📜</span><span>Logs</span></li>
            <li class="nav-item" data-page="logout"><span class="nav-icon">🚪</span><span>Logout</span></li>
        </ul>
    </div>
    <div class="main-content">
        <div id="mainContent"></div>
    </div>
</div>

<script>
    let token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
    let adminInfo = null;

    // Helper: Save with automatic page refresh (used in settings)
    async function saveWithRefresh(url, payload, successMessage) {
        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                const currentPage = document.querySelector('.nav-item.active')?.dataset.page || 'settings';
                loadPage(currentPage);
                showToast(successMessage, 'success');
            } else {
                const error = await response.json();
                showToast(error.error || 'Save failed', 'error');
            }
        } catch (error) {
            showToast('Network error', 'error');
        }
    }

    async function init() {
        if (!token) { window.location.href = '/admin'; return; }
        try {
            const me = await fetch('/api/auth/admin/me', { headers: { 'Authorization': token } });
            if (!me.ok) throw new Error('Not authenticated');
            const meData = await me.json();
            adminInfo = meData.admin;
            document.getElementById('orgNameSidebar').innerText = adminInfo.organization_name || 'Business';

            const settingsRes = await fetch('/api/admin/settings', { headers: { 'Authorization': token } });
            const settingsData = await settingsRes.json();
            const currencyCode = settingsData.organization?.currency || 'USD';
            const currencySymbols = {
                USD: '$', EUR: '€', GBP: '£', JPY: '¥', CAD: 'C$', AUD: 'A$', CHF: 'Fr', CNY: '¥', INR: '₹'
            };
            window.currencySymbol = currencySymbols[currencyCode] || '$';

            loadPage('dashboard');
        } catch(e) { localStorage.removeItem('adminToken'); window.location.href = '/admin'; }
    }

    function updateAdminDateTime() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        const dtElement = document.getElementById('adminLiveDateTime');
        if (dtElement) dtElement.innerText = now.toLocaleDateString(undefined, options);
    }
    setInterval(updateAdminDateTime, 1000);

    // ===================== SERVICES PAGE =====================
    async function renderServices(container) {
        try {
            const res = await fetch('/api/admin/services', { headers: { 'Authorization': token } });
            const data = await res.json();
            const allServices = data.services || [];
            let currentServices = [...allServices];

            const renderServiceList = (services) => {
                const servicesList = document.getElementById('servicesList');
                if (!servicesList) return;
                if (services.length === 0) {
                    servicesList.innerHTML = '<div class="spinner">No services found</div>';
                    return;
                }
                servicesList.innerHTML = services.map(s => `
                    <div class="settings-section" style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3>${escapeHtml(s.name)} (${s.duration_minutes} min) - ${window.currencySymbol}${s.price}</h3>
                            <button class="btn-secondary edit-service" data-id="${s.id}">Edit</button>
                        </div>
                        <p>${s.description || ''}</p>
                    </div>
                `).join('');
                document.querySelectorAll('.edit-service').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        const res = await fetch(`/api/admin/services/${id}`, { headers: { 'Authorization': token } });
                        const data = await res.json();
                        if (data.success) showServiceModal(data.service);
                    });
                });
            };

            container.innerHTML = `
                <div class="page-header">
                    <h1>Services</h1>
                    <button class="btn-primary" id="addServiceBtn">+ Add Service</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="serviceSearch" placeholder="Search by name or description...">
                </div>
                <div id="servicesList"></div>
                <div id="serviceModal" class="modal" style="display:none">
                    <div class="modal-content">
                        <h2 id="modalTitle">Add Service</h2>
                        <input type="hidden" id="serviceId">
                        <div class="form-row"><label>Service Name</label><input id="serviceName" placeholder="e.g., Dental Cleaning"></div>
                        <div class="form-row"><label>Description</label><textarea id="serviceDescription" rows="3"></textarea></div>
                        <div class="form-row"><label>Duration (minutes)</label><input id="serviceDuration" type="number" value="30"></div>
                        <div class="form-row"><label>Buffer (minutes)</label><input id="serviceBuffer" type="number" value="0"></div>
                        <div class="form-row"><label>Price (${window.currencySymbol})</label><input id="servicePrice" type="number" step="0.01" value="0"></div>
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                            <input type="checkbox" id="serviceActive" checked style="margin: 0;">
                            <label for="serviceActive" style="margin: 0; font-weight: normal;">Active</label>
                        </div>
                        <div style="display: flex; gap: 8px; justify-content: flex-end;">
                            <button class="btn-secondary" id="closeServiceModal">Cancel</button>
                            <button class="btn-primary" id="saveServiceBtn">Save</button>
                        </div>
                    </div>
                </div>
            `;

            renderServiceList(currentServices);

            document.getElementById('serviceSearch')?.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allServices.filter(s => s.name?.toLowerCase().includes(term) || s.description?.toLowerCase().includes(term));
                renderServiceList(filtered);
            });

            document.getElementById('addServiceBtn')?.addEventListener('click', () => showServiceModal());
            document.getElementById('closeServiceModal')?.addEventListener('click', () => closeServiceModal());
            document.getElementById('saveServiceBtn')?.addEventListener('click', saveService);

            async function saveService() {
                const serviceData = {
                    id: document.getElementById('serviceId').value || null,
                    name: document.getElementById('serviceName').value,
                    description: document.getElementById('serviceDescription').value,
                    duration_minutes: parseInt(document.getElementById('serviceDuration').value),
                    buffer_minutes: parseInt(document.getElementById('serviceBuffer').value),
                    price: parseFloat(document.getElementById('servicePrice').value),
                    is_active: document.getElementById('serviceActive').checked
                };
                const response = await fetch('/api/admin/services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify(serviceData)
                });
                if (response.ok) {
                    closeServiceModal();
                    loadPage('services');
                    showToast('Service saved', 'success');
                } else {
                    showToast('Error saving service', 'error');
                }
            }

            function showServiceModal(service = null) {
                document.getElementById('serviceId').value = service?.id || '';
                document.getElementById('serviceName').value = service?.name || '';
                document.getElementById('serviceDescription').value = service?.description || '';
                document.getElementById('serviceDuration').value = service?.duration_minutes || 30;
                document.getElementById('serviceBuffer').value = service?.buffer_minutes || 0;
                document.getElementById('servicePrice').value = service?.price || 0;
                document.getElementById('serviceActive').checked = service?.is_active !== false;
                document.getElementById('modalTitle').innerText = service ? 'Edit Service' : 'Add Service';
                document.getElementById('serviceModal').style.display = 'flex';
            }

            function closeServiceModal() {
                document.getElementById('serviceModal').style.display = 'none';
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m){
                    if(m==='&') return '&amp;';
                    if(m==='<') return '&lt;';
                    if(m==='>') return '&gt;';
                    return m;
                });
            }
        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="spinner">Error loading services</div>';
        }
    }


    // ===================== BOOKING PAGE =====================

    async function renderBookings(container) {
        const res = await fetch('/api/admin/bookings', { headers: { 'Authorization': token } });
        const data = await res.json();
        const allBookings = data.bookings || [];
        let filtered = [...allBookings];
        let searchTerm = '';
        let statusFilter = '';

        const renderBookingsTable = () => {
            const tableContainer = document.getElementById('bookingsTable');
            let filteredByStatus = statusFilter ? filtered.filter(b => b.status === statusFilter) : filtered;
            if (filteredByStatus.length === 0) {
                tableContainer.innerHTML = '<div class="spinner">No bookings found</div>';
                return;
            }
            let html = `<div style="overflow-x:auto;"><table class="data-table"><thead><tr>
                <th>ID</th><th>Date</th><th>Time</th><th>Customer</th><th>Email</th><th>Phone</th><th>Service</th><th>Staff</th><th>Status</th><th>Created</th><th>Actions</th>
            </tr></thead><tbody>`;
            filteredByStatus.forEach(b => {
                html += `<tr>
                    <td>${b.id}</td>
                    <td>${b.booking_date?.slice(0,10)}</td>
                    <td>${b.start_time} - ${b.end_time}</td>
                    <td>${b.customer_name || ''}</td>
                    <td>${b.customer_email || ''}</td>
                    <td>${b.customer_phone || ''}</td>
                    <td>${b.service_name || '-'}</td>
                    <td>${b.staff_name || '-'}</td>
                    <td class="status-badge status-${b.status}">${b.status}</td>
                    <td>${b.created_at ? new Date(b.created_at).toLocaleDateString() : '-'}</td>
                    <td class="action-buttons">
                        <button class="btn-sm btn-remind" onclick="sendReminder(${b.id})">Remind</button>
                        <button class="btn-sm btn-reschedule" onclick="rescheduleBooking(${b.id})">Reschedule</button>
                        <button class="btn-sm btn-cancel" onclick="cancelBooking(${b.id})">Cancel</button>
                        ${b.status !== 'no-show' ? `<button class="btn-sm btn-secondary" onclick="markAsNoShow(${b.id})">No‑Show</button>` : ''}
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            tableContainer.innerHTML = html;
        };

        // Filter by status dropdown
        const statusSelect = document.createElement('select');
        statusSelect.id = 'bookingStatusFilter';
        statusSelect.innerHTML = `<option value="">All status</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
            <option value="no-show">No‑Show</option>`;
        statusSelect.addEventListener('change', (e) => {
            statusFilter = e.target.value;
            renderBookingsTable();
        });

        // Search input
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.id = 'bookingSearch';
        searchInput.placeholder = 'Search by customer name, email, or phone...';
        searchInput.style.flex = '1';
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            filtered = allBookings.filter(b =>
                (b.customer_name?.toLowerCase().includes(searchTerm)) ||
                (b.customer_email?.toLowerCase().includes(searchTerm)) ||
                (b.customer_phone?.toLowerCase().includes(searchTerm))
            );
            renderBookingsTable();
        });

        const toolbar = document.createElement('div');
        toolbar.className = 'search-bar';
        toolbar.appendChild(searchInput);
        toolbar.appendChild(statusSelect);

        container.innerHTML = `<div class="page-header"><h1>Bookings</h1></div>`;
        container.appendChild(toolbar);
        const tableDiv = document.createElement('div');
        tableDiv.id = 'bookingsTable';
        container.appendChild(tableDiv);

        filtered = [...allBookings];
        renderBookingsTable();
    }


    // ===================== DASHBOARD PAGE =====================
    async function renderDashboard(container) {
        const [bookingsRes, customersRes] = await Promise.all([
            fetch('/api/admin/bookings', { headers: { 'Authorization': token } }),
            fetch('/api/admin/customers', { headers: { 'Authorization': token } })
        ]);
        const bookingsData = await bookingsRes.json();
        const customersData = await customersRes.json();
        const totalBookings = bookingsData.bookings?.length || 0;
        const confirmed = bookingsData.bookings?.filter(b => b.status === 'confirmed').length || 0;
        const totalCustomers = customersData.customers?.length || 0;
        container.innerHTML = `
            <div class="page-header">
                <h1>Dashboard</h1>
                <div>
                    <div>Welcome, ${adminInfo.name || 'Admin'}</div>
                    <div id="adminLiveDateTime" style="font-size: 14px; color: #666; margin-top: 5px;"></div>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalBookings}</div><div class="stat-label">Total Bookings</div></div>
                <div class="stat-card"><div class="stat-number">${confirmed}</div><div class="stat-label">Confirmed</div></div>
                <div class="stat-card"><div class="stat-number">${totalCustomers}</div><div class="stat-label">Customers</div></div>
            </div>
            <div class="settings-section"><h3>Recent Bookings</h3>${renderTable(bookingsData.bookings?.slice(0,5) || [])}</div>
        `;
    }
    function renderTable(bookings) {
        if (!bookings.length) return '<div>No bookings</div>';
        return `<table class="data-table"><thead><tr><th>Date</th><th>Time</th><th>Customer</th><th>Status</th></tr></thead><tbody>
            ${bookings.map(b => `<tr><td>${b.booking_date.slice(0,10)}</td><td>${b.start_time}-${b.end_time}</td><td>${b.customer_name}</td><td class="status-badge status-${b.status}">${b.status}</td></tr>`).join('')}
        </tbody></table>`;
    }

    // ===================== CUSTOMERS PAGE =====================
    async function renderCustomers(container) {
        const res = await fetch('/api/admin/customers', { headers: { 'Authorization': token } });
        const data = await res.json();
        const allCustomers = data.customers || [];
        const availableColumns = [
            { key: 'name', label: 'Name', visible: true },
            { key: 'email', label: 'Email', visible: true },
            { key: 'phone', label: 'Phone', visible: true },
            { key: 'total_bookings', label: 'Bookings', visible: true },
            { key: 'last_booking_date', label: 'Last Booking', visible: true },
            { key: 'created_at', label: 'Joined', visible: false }
        ];
        let currentCustomers = [...allCustomers];
        let searchTerm = '';

        const renderCustomerTable = () => {
            const tableContainer = document.getElementById('customersTable');
            const visibleCols = availableColumns.filter(col => col.visible);
            if (!currentCustomers.length) {
                tableContainer.innerHTML = '<div class="spinner">No customers found</div>';
                return;
            }
            let html = `<table class="data-table"><thead><tr>`;
            visibleCols.forEach(col => {
                html += `<th data-sort="${col.key}" style="cursor: pointer;">${col.label} ↕</th>`;
            });
            html += `</thead><tbody>`;
            currentCustomers.forEach(c => {
                html += `<tr>`;
                visibleCols.forEach(col => {
                    let value = c[col.key] || '';
                    if (col.key === 'created_at' || col.key === 'last_booking_date') {
                        value = value ? new Date(value).toLocaleDateString() : '-';
                    }
                    html += `<td>${value}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            tableContainer.innerHTML = html;

            document.querySelectorAll('#customersTable th').forEach(th => {
                th.addEventListener('click', () => {
                    const sortKey = th.dataset.sort;
                    if (sortKey) {
                        currentCustomers.sort((a, b) => {
                            let valA = a[sortKey] || '';
                            let valB = b[sortKey] || '';
                            if (sortKey === 'created_at' || sortKey === 'last_booking_date') {
                                valA = new Date(valA) || 0;
                                valB = new Date(valB) || 0;
                            }
                            if (valA < valB) return -1;
                            if (valA > valB) return 1;
                            return 0;
                        });
                        renderCustomerTable();
                    }
                });
            });
        };
        container.innerHTML = `
            <div class="page-header"><h1>Customers</h1></div>
            <div class="search-bar">
                <input type="text" id="customerSearch" placeholder="Search by name or email..." style="flex:2;">
                <button id="manageColumnsBtn" class="btn-secondary" style="white-space: nowrap;">Manage Columns</button>
            </div>
            <div id="customersTable"></div>
            <div id="columnModal" class="modal" style="display:none">
                <div class="modal-content">
                    <h2>Manage Columns</h2>
                    <div id="columnList"></div>
                    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px;">
                        <button class="btn-secondary" id="closeColumnModal">Close</button>
                    </div>
                </div>
            </div>
        `;

        const renderColumnToggles = () => {
            const columnList = document.getElementById('columnList');
            columnList.innerHTML = availableColumns.map(col => `
                <div class="form-row" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="col_${col.key}" ${col.visible ? 'checked' : ''} style="width: auto;">
                    <label for="col_${col.key}" style="margin: 0;">${col.label}</label>
                </div>
            `).join('');
            availableColumns.forEach(col => {
                const checkbox = document.getElementById(`col_${col.key}`);
                if (checkbox) {
                    checkbox.addEventListener('change', (e) => {
                        col.visible = e.target.checked;
                        renderCustomerTable();
                    });
                }
            });
        };

        document.getElementById('customerSearch').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            currentCustomers = allCustomers.filter(c => c.name?.toLowerCase().includes(searchTerm) || c.email?.toLowerCase().includes(searchTerm));
            renderCustomerTable();
        });
        document.getElementById('manageColumnsBtn').addEventListener('click', () => {
            renderColumnToggles();
            document.getElementById('columnModal').style.display = 'flex';
        });
        document.getElementById('closeColumnModal').addEventListener('click', () => {
            document.getElementById('columnModal').style.display = 'none';
        });
        currentCustomers = [...allCustomers];
        renderCustomerTable();
    }

    // ===================== SETTINGS PAGE =====================
    async function renderSettings(container) {
        const res = await fetch('/api/admin/settings', { headers: { 'Authorization': token } });
        const data = await res.json();
        const org = data.organization || {};
        const hours = data.business_hours || [];
        container.innerHTML = `
            <div class="page-header"><h1>Settings</h1></div>
            <div class="settings-section"><h3>Business Info</h3>
                <div class="form-row"><label>Name</label><input id="orgName" value="${org.name||''}"></div>
                <div class="form-row"><label>Email</label><input id="orgEmail" value="${org.email||''}"></div>
                <div class="form-row"><label>Phone</label><input id="orgPhone" value="${org.phone||''}"></div>
                <div class="form-row"><label>Address</label><input id="orgAddress" value="${org.address||''}"></div>
                <div class="form-row"><label>City</label><input id="orgCity" value="${org.city||''}"></div>
                <div class="form-row"><label>Postcode</label><input id="orgPostcode" value="${org.postcode||''}"></div>
                <div class="form-row">
                    <label>Currency</label>
                    <select id="orgCurrency">
                        <option value="USD" ${org.currency === 'USD' ? 'selected' : ''}>USD ($)</option>
                        <option value="EUR" ${org.currency === 'EUR' ? 'selected' : ''}>EUR (€)</option>
                        <option value="GBP" ${org.currency === 'GBP' ? 'selected' : ''}>GBP (£)</option>
                        <option value="JPY" ${org.currency === 'JPY' ? 'selected' : ''}>JPY (¥)</option>
                        <option value="CAD" ${org.currency === 'CAD' ? 'selected' : ''}>CAD (C$)</option>
                        <option value="AUD" ${org.currency === 'AUD' ? 'selected' : ''}>AUD (A$)</option>
                        <option value="CHF" ${org.currency === 'CHF' ? 'selected' : ''}>CHF (Fr)</option>
                        <option value="CNY" ${org.currency === 'CNY' ? 'selected' : ''}>CNY (¥)</option>
                        <option value="INR" ${org.currency === 'INR' ? 'selected' : ''}>INR (₹)</option>
                    </select>
                </div>
                <button class="btn-primary" id="saveOrgBtn">Save</button>
            </div>
            <div class="settings-section"><h3>Business Hours</h3><div id="hoursGrid" class="hours-grid"></div>
                <button class="btn-primary" id="saveHoursBtn">Save Hours</button>
            </div>
            <div class="settings-section"><h3>Shareable Booking Link</h3>
                <div style="display:flex; gap:10px;"><input id="shareLink" readonly style="flex:1"><button id="copyLinkBtn" class="btn-secondary">Copy</button></div>
            </div>
        `;

        const hoursGrid = document.getElementById('hoursGrid');
        const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        for (let i=0;i<7;i++) {
            const h = hours.find(hh => hh.day_of_week === i) || { is_open: (i>=1 && i<=5), open_time:'09:00', close_time:'17:00', slot_interval:30 };
            hoursGrid.innerHTML += `
                <div class="hour-card">
                    <div class="day">${dayNames[i]}</div>
                    <input type="checkbox" id="open_${i}" ${h.is_open ? 'checked' : ''}>
                    <input type="time" id="open_time_${i}" value="${h.open_time||'09:00'}" ${!h.is_open ? 'disabled' : ''}>
                    <span>to</span>
                    <input type="time" id="close_time_${i}" value="${h.close_time||'17:00'}" ${!h.is_open ? 'disabled' : ''}>
                </div>`;
            document.getElementById(`open_${i}`).addEventListener('change', (e) => {
                const disabled = !e.target.checked;
                document.getElementById(`open_time_${i}`).disabled = disabled;
                document.getElementById(`close_time_${i}`).disabled = disabled;
            });
        }

        const linkRes = await fetch('/api/admin/settings/shareable-link', { headers: { 'Authorization': token } });
        const linkData = await linkRes.json();
        if (linkData.success) document.getElementById('shareLink').value = linkData.link;
        document.getElementById('copyLinkBtn').addEventListener('click', () => { document.getElementById('shareLink').select(); document.execCommand('copy'); showToast('Link copied', 'success'); });
        document.getElementById('saveOrgBtn').addEventListener('click', async () => {
            const payload = {
                name: document.getElementById('orgName').value,
                email: document.getElementById('orgEmail').value,
                phone: document.getElementById('orgPhone').value,
                address: document.getElementById('orgAddress').value,
                city: document.getElementById('orgCity').value,
                postcode: document.getElementById('orgPostcode').value,
                currency: document.getElementById('orgCurrency').value
            };
            const newCurrency = payload.currency;
            const currencySymbols = { USD: '$', EUR: '€', GBP: '£', JPY: '¥', CAD: 'C$', AUD: 'A$', CHF: 'Fr', CNY: '¥', INR: '₹' };
            window.currencySymbol = currencySymbols[newCurrency] || '$';
            await saveWithRefresh('/api/admin/settings/organization', payload, 'Organization updated');
        });
        document.getElementById('saveHoursBtn').addEventListener('click', async () => {
            const hoursArray = [];
            for (let i = 0; i < 7; i++) {
                hoursArray.push({
                    day_of_week: i,
                    is_open: document.getElementById(`open_${i}`).checked,
                    open_time: document.getElementById(`open_time_${i}`).value,
                    close_time: document.getElementById(`close_time_${i}`).value,
                    slot_interval: 30
                });
            }
            await saveWithRefresh('/api/admin/settings/business-hours', { hours: hoursArray }, 'Business hours saved');
        });
    }

    // ===================== LOGS PAGE =====================
    async function renderLogs(container) {
        const res = await fetch('/api/admin/bookings', { headers: { 'Authorization': token } });
        const data = await res.json();
        const bookings = data.bookings || [];
        const logs = bookings.flatMap(b => b.booking_history || []).slice(0, 50);
        container.innerHTML = `<div class="page-header"><h1>Audit Logs</h1></div>
            <table class="data-table"><thead><tr><th>Time</th><th>Booking ID</th><th>Action</th><th>Details</th></tr></thead><tbody>
            ${logs.map(l => `<tr><td>${new Date(l.changed_at).toLocaleString()}</td><td>${l.booking_id}</td><td>Status: ${l.old_status} → ${l.new_status}</td><td>${l.notes || ''}</td></td>`).join('')}
            </tbody>｜｜DSML｜｜`;
        if (!logs.length) container.innerHTML += '<div class="spinner">No logs yet</div>';
    }

    // ===================== PAGE LOADER =====================
    async function loadPage(page) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
        const container = document.getElementById('mainContent');
        // Clear container and add persistent header + page content
        container.innerHTML = `<div id="persistentHeader" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; padding: 0;">
            <div style="text-align: right;">
                <div id="adminWelcome" style="font-size: 14px; color: #666;">Welcome, Loading...</div>
                <div id="adminLiveDateTime" style="font-size: 14px; color: #666; margin-top: 5px;"></div>
            </div>
        </div>`;
        // Create a temporary div to hold the page content
        const contentDiv = document.createElement('div');
        contentDiv.id = 'pageContent';
        container.appendChild(contentDiv);
        // Show spinner while loading
        contentDiv.innerHTML = '<div class="spinner">Loading...</div>';
        
        if (page === 'dashboard') await renderDashboard(contentDiv);
        else if (page === 'calendar') await renderCalendar(contentDiv);
        else if (page === 'bookings') await renderBookings(contentDiv);
        else if (page === 'customers') await renderCustomers(contentDiv);
        else if (page === 'services') await renderServices(contentDiv);
        else if (page === 'settings') await renderSettings(contentDiv);
        else if (page === 'logs') await renderLogs(contentDiv);
        else if (page === 'logout') logout();
        
        // Update welcome text and ensure datetime interval works
        const welcomeEl = document.getElementById('adminWelcome');
        if (welcomeEl && adminInfo) welcomeEl.innerText = `Welcome, ${adminInfo.name || 'Admin'}`;
    }

    function attachMenuEvents() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const page = item.dataset.page;
                if (page === 'logout') logout();
                else if (page) loadPage(page);
            });
        });
    }
    attachMenuEvents();

    // ===================== CALENDAR (FIXED) =====================
    async function renderCalendar(container) {
        let currentView = 'month';
        let currentDate = new Date();
        let businessHours = [];

        try {
            const res = await fetch('/api/admin/settings', { headers: { 'Authorization': token } });
            const data = await res.json();
            businessHours = data.business_hours || [];
        } catch(e) { console.error('Failed to load hours:', e); }

        container.innerHTML = `<div class="page-header"><h1>Calendar</h1><div class="view-selector">
            <button class="view-btn" data-view="month">Month</button>
            <button class="view-btn" data-view="week">Week</button>
            <button class="view-btn" data-view="day">Day</button>
        </div></div>
        <div class="calendar-nav"><button class="nav-arrow" id="prevBtn">← Prev</button><span id="calDate" class="current-date"></span><button class="nav-arrow" id="nextBtn">Next →</button></div>
        <div id="calContainer" class="calendar-view"><div class="spinner">Loading...</div></div>`;

        async function getAvailability(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2,'0');
            const d = String(date.getDate()).padStart(2,'0');
            const dateStr = `${y}-${m}-${d}`;
            const res = await fetch(`/api/admin/availability/${dateStr}`, { headers: { 'Authorization': token } });
            const data = await res.json();
            return data.slots || [];
        }

        async function renderView() {
            const calDiv = document.getElementById('calContainer');
            if (!calDiv) return;
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            if (currentView === 'month') {
                const statsRes = await fetch(`/api/calendar/monthly-stats/${year}/${month+1}?orgId=${adminInfo.organization_id}`, { headers: { 'Authorization': token } });
                const statsData = await statsRes.json();
                const statsMap = {};
                (statsData.stats || []).forEach(s => { statsMap[s.day_date.split('T')[0]] = s; });

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startWeekday = firstDay.getDay();
                const daysInMonth = lastDay.getDate();

                let html = '<div class="month-grid">';
                ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => html += `<div class="month-day-header">${d}</div>`);
                for (let i=0; i<startWeekday; i++) html += '<div class="month-day disabled"></div>';

                for (let d=1; d<=daysInMonth; d++) {
                    const date = new Date(year, month, d);
                    const statsKey = date.toISOString().split('T')[0];
                    const localYear = date.getFullYear();
                    const localMonth = String(date.getMonth()+1).padStart(2,'0');
                    const localDay = String(date.getDate()).padStart(2,'0');
                    const localDateStr = `${localYear}-${localMonth}-${localDay}`;
                    const stats = statsMap[statsKey] || {};
                    const free = stats.free_slots || 0;
                    const booked = stats.booked_slots || 0;
                    const dow = date.getDay();
                    const bh = businessHours.find(h => h.day_of_week === dow);
                    const isOpen = bh?.is_open === true;

                    html += `<div class="month-day ${!isOpen ? 'disabled' : ''}" data-date="${localDateStr}" onclick="${isOpen ? `selectDateAdmin('${localDateStr}')` : ''}">
                                <div class="day-number">${d}</div>
                                <div class="day-stats">${isOpen ? `${free} free / ${booked} booked` : 'Closed'}</div>
                            </div>`;
                }
                html += '</div>';
                calDiv.innerHTML = html;
                document.getElementById('calDate').innerText = currentDate.toLocaleDateString('en-US', { month:'long', year:'numeric' });
            } else if (currentView === 'day') {
                const slots = await getAvailability(currentDate);
                if (!slots || slots.length === 0) {
                    calDiv.innerHTML = '<div class="spinner">No slots available for this day</div>';
                    return;
                }
                let html = `<table class="weekly-table" style="width:100%; border-collapse:collapse;">
                    <thead><tr><th style="width:25%">Time</th><th style="width:15%">Status</th><th style="width:25%">Staff</th><th style="width:25%">Customer</th><th style="width:10%">Action</th></tr></thead><tbody>`;
                for (const slot of slots) {
                    const isAvail = slot.is_available;
                    const customerName = slot.customer_name || '';
                    const shortCustomer = customerName.length > 20 ? customerName.substring(0,18)+'…' : customerName;
                    const year = currentDate.getFullYear();
                    const month = String(currentDate.getMonth() + 1).padStart(2,'0');
                    const day = String(currentDate.getDate()).padStart(2,'0');
                    const localDateStr = `${year}-${month}-${day}`;
                    html += `<tr style="border-bottom:1px solid #ddd;">
                        <td style="padding:8px;">${slot.slot_start} - ${slot.slot_end}</td>
                        <td style="padding:8px;">${isAvail ? '✅ Available' : '❌ Booked'}</td>
                        <td style="padding:8px;">${slot.staff_name || 'Any'}</td>
                        <td style="padding:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${customerName}">${shortCustomer}</td>
                        <td style="padding:8px;">
                            ${isAvail ? 
                                `<button class="btn-sm btn-primary" onclick="openAdminBookingModal('${localDateStr}','${slot.slot_start}','${slot.slot_end}')">Book</button>` : 
                                `<button class="btn-sm btn-danger" onclick="adminCancelBooking(${slot.booking_id})">Cancel</button>`
                            }
                        </td>
                    </tr>`;
                }
                html += '</tbody></td>';
                calDiv.innerHTML = html;
                document.getElementById('calDate').innerText = currentDate.toLocaleDateString();
            } else if (currentView === 'week') {
                const startOfWeek = new Date(currentDate);
                startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
                const days = [];
                for (let i = 0; i < 7; i++) {
                    const day = new Date(startOfWeek);
                    day.setDate(startOfWeek.getDate() + i);
                    days.push(day);
                }

                // Determine all possible time slots from all open days in the week
                let allSlots = [];
                for (const day of days) {
                    const dow = day.getDay();
                    const bh = businessHours.find(h => h.day_of_week === dow);
                    if (bh && bh.is_open) {
                        let cur = new Date(`2000-01-01T${bh.open_time}`);
                        const close = new Date(`2000-01-01T${bh.close_time}`);
                        const interval = bh.slot_interval || 30;
                        while (cur < close) {
                            const start = cur.toTimeString().slice(0,5);
                            cur.setMinutes(cur.getMinutes() + interval);
                            const end = cur.toTimeString().slice(0,5);
                            if (!allSlots.find(s => s.start === start && s.end === end)) {
                                allSlots.push({ start, end });
                            }
                        }
                    }
                }
                allSlots.sort((a,b) => a.start.localeCompare(b.start));

                // Fetch availability for each day in parallel
                const availMap = {};
                await Promise.all(days.map(async (day) => {
                    const slots = await getAvailability(day);
                    const dateStr = day.toISOString().split('T')[0];
                    availMap[dateStr] = slots;
                }));

                // Build the HTML table: rows = time slots, columns = days
                let html = '<table class="weekly-table" style="width:100%; border-collapse:collapse;">';
                html += '<thead></td><th style="width:15%">Time</th>';
                for (const day of days) {
                    html += `<th>${day.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })}</th>`;
                }
                html += '</thead><tbody>';

                for (const slot of allSlots) {
                    html += '<tr>';
                    html += `<td style="padding:6px; border:1px solid #ddd; background:#f8f9fa;">${slot.start} - ${slot.end}</td>`;
                    for (const day of days) {
                        const dateStr = day.toISOString().split('T')[0];
                        const slotsForDay = availMap[dateStr] || [];
                        const found = slotsForDay.find(s => s.slot_start === slot.start);
                        const isAvail = found ? found.is_available : false;
                        const bookingId = found ? found.booking_id : null;
                        const customerName = found ? (found.customer_name || '') : '';
                        const localDateStr = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;

                        if (!found) {
                            html += `<td style="padding:6px; border:1px solid #ddd; text-align:center;">—</td>`;
                        } else if (isAvail) {
                            html += `<td style="padding:6px; border:1px solid #ddd; background:#d4edda; text-align:center;">
                                        <button class="btn-sm btn-book" onclick="openAdminBookingModal('${localDateStr}','${slot.start}','${slot.end}')">Book</button>
                                      </td>`;
                        } else {
                            const shortCustomer = customerName.length > 12 ? customerName.substring(0,10)+'…' : customerName;
                            html += `<td style="padding:6px; border:1px solid #ddd; background:#f8d7da; text-align:center;">
                                        ❌ Booked<br><small>${shortCustomer}</small><br>
                                        <button class="btn-sm btn-cancel" onclick="adminCancelBooking(${bookingId})">Cancel</button>
                                      </td>`;
                        }
                    }
                    html += '</tr>';
                }
                html += '</tbody></table>';
                calDiv.innerHTML = html;
                document.getElementById('calDate').innerText = `Week of ${startOfWeek.toLocaleDateString()}`;
            }
        }

        window.selectDateAdmin = (dateStr) => {
            const parts = dateStr.split('-');
            currentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            currentView = 'day';
            renderView();
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.view-btn[data-view="day"]')?.classList.add('active');
        };

        const changeView = (view) => {
            currentView = view;
            renderView();
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.view-btn[data-view="${view}"]`)?.classList.add('active');
        };

        const changeDate = (delta) => {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + delta);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + delta * 7);
            else currentDate.setDate(currentDate.getDate() + delta);
            renderView();
        };

        document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', () => changeView(btn.dataset.view)));
        document.getElementById('prevBtn').addEventListener('click', () => changeDate(-1));
        document.getElementById('nextBtn').addEventListener('click', () => changeDate(1));

        await renderView();
    }

    // ===================== ADMIN BOOKING MODAL =====================
    async function loadAdminBookingOptions() {
        const [servicesRes, staffRes] = await Promise.all([
            fetch('/api/admin/services', { headers: { 'Authorization': token } }),
            fetch('/api/admin/staff', { headers: { 'Authorization': token } })
        ]);
        const servicesData = await servicesRes.json();
        const staffData = await staffRes.json();
        const serviceSelect = document.getElementById('adminBookingService');
        const staffSelect = document.getElementById('adminBookingStaff');
        if (serviceSelect) {
            serviceSelect.innerHTML = '<option value="">Select a service</option>' +
                (servicesData.services || []).map(s => `<option value="${s.id}">${s.name} (${s.duration_minutes} min - ${window.currencySymbol}${s.price})</option>`).join('');
        }
        if (staffSelect) {
            staffSelect.innerHTML = '<option value="">Any staff</option>' +
                (staffData.staff || []).map(s => `<option value="${s.id}">${s.name} - ${s.role}</option>`).join('');
        }
    }

    function openAdminBookingModal(date, start, end) {
        document.getElementById('adminBookingDate').value = date;
        document.getElementById('adminBookingStart').value = start;
        document.getElementById('adminBookingEnd').value = end;
        document.getElementById('adminBookingName').value = '';
        document.getElementById('adminBookingEmail').value = '';
        document.getElementById('adminBookingPhone').value = '';
        loadAdminBookingOptions();
        document.getElementById('adminBookingModal').style.display = 'flex';
    }

    function closeAdminBookingModal() {
        document.getElementById('adminBookingModal').style.display = 'none';
    }

    async function submitAdminBooking() {
        const date = document.getElementById('adminBookingDate').value;
        const start = document.getElementById('adminBookingStart').value;
        const end = document.getElementById('adminBookingEnd').value;
        const name = document.getElementById('adminBookingName').value;
        const email = document.getElementById('adminBookingEmail').value;
        const phone = document.getElementById('adminBookingPhone').value;
        const serviceId = document.getElementById('adminBookingService').value;
        const staffId = document.getElementById('adminBookingStaff').value;
        const recurring = document.getElementById('recurringCheckbox')?.checked || false;

        if (!name || !email) {
            showToast('Name and email are required', 'error');
            return;
        }

        // Find or create customer
        let customerId = null;
        const existingCustomer = await fetch(`/api/admin/customers?search=${encodeURIComponent(email)}`, { headers: { 'Authorization': token } });
        const existingData = await existingCustomer.json();
        const found = existingData.customers?.find(c => c.email === email);
        if (found) {
            customerId = found.id;
        } else {
            const newCust = await fetch('/api/admin/customers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ name, email, phone, organization_id: adminInfo.organization_id })
            });
            const newData = await newCust.json();
            if (newData.success) customerId = newData.customer.id;
        }

        if (!customerId) {
            showToast('Could not create/find customer', 'error');
            return;
        }

        const payload = {
            organization_id: adminInfo.organization_id,
            customer_id: customerId,
            service_id: serviceId || null,
            staff_id: staffId || null,
            booking_date: date,
            start_time: start,
            end_time: end,
            customer_name: name,
            customer_email: email,
            customer_phone: phone,
            status: 'pending'
        };

        if (recurring) {
            const weeks = 4;
            const res = await fetch('/api/admin/bookings/recurring', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ firstBooking: payload, weeks, customer_id: customerId, service_id: serviceId, staff_id: staffId })
            });
            if (res.ok) {
                showToast('Recurring bookings created (4 weeks)', 'success');
                closeAdminBookingModal();
                const container = document.getElementById('mainContent');
                renderCalendar(container);
            } else {
                showToast('Error creating recurring bookings', 'error');
            }
        } else {
            const res = await fetch('/api/calendar/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                showToast('Booking confirmed', 'success');
                closeAdminBookingModal();
                const container = document.getElementById('mainContent');
                renderCalendar(container);
            } else {
                showToast(data.error || 'Booking failed', 'error');
            }
        }
    }

    async function adminCancelBooking(bookingId) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        const res = await fetch(`/api/admin/bookings/${bookingId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ status: 'cancelled' })
        });
        if (res.ok) {
            showToast('Booking cancelled', 'success');
            const container = document.getElementById('mainContent');
            renderCalendar(container);
        } else {
            showToast('Error cancelling', 'error');
        }
    }

     // ========== BOOKINGS PAGE ACTION FUNCTIONS ==========
    window.sendReminder = async (bookingId) => {
        const res = await fetch(`/api/admin/bookings/${bookingId}/remind`, { method: 'POST', headers: { 'Authorization': token } });
        if (res.ok) showToast('Reminder sent', 'success');
        else showToast('Failed', 'error');
    };

    window.rescheduleBooking = async (bookingId) => {
        const newDate = prompt('New date (YYYY-MM-DD):');
        const newStart = prompt('New start time (HH:MM:SS):');
        const newEnd = prompt('New end time (HH:MM:SS):');
        if (!newDate || !newStart || !newEnd) return;
        const res = await fetch(`/api/admin/bookings/${bookingId}/reschedule`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ booking_date: newDate, start_time: newStart, end_time: newEnd })
        });
        if (res.ok) { showToast('Rescheduled', 'success'); loadPage('bookings'); }
        else showToast('Error', 'error');
    };

    window.cancelBooking = async (bookingId) => {
        if (!confirm('Cancel this booking?')) return;
        const res = await fetch(`/api/admin/bookings/${bookingId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ status: 'cancelled' })
        });
        if (res.ok) { showToast('Cancelled', 'success'); loadPage('bookings'); }
        else showToast('Error', 'error');
    };

    window.markAsNoShow = async (bookingId) => {
        if (!confirm('Mark this booking as no-show?')) return;
        const res = await fetch(`/api/admin/bookings/${bookingId}/no-show`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': token }
        });
        if (res.ok) { showToast('Marked as no-show', 'success'); loadPage('bookings'); }
        else showToast('Error', 'error');
    };

    // Attach modal event listeners
    document.addEventListener('DOMContentLoaded', () => {
        const closeBtn = document.getElementById('closeAdminBookingModal');
        const confirmBtn = document.getElementById('confirmAdminBookingBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeAdminBookingModal);
        if (confirmBtn) confirmBtn.addEventListener('click', submitAdminBooking);
    });

    function showToast(msg, type) {
        let t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function logout() {
        await fetch('/api/auth/admin/logout', { method: 'POST', headers: { 'Authorization': token } });
        localStorage.clear();
        window.location.href = '/admin';
    }

    // Start the application
    init();
</script>
