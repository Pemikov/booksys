<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Booking System</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>Booking System</h1>
        <p>Admin Portal</p>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="admin@sample.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter your password">
        </div>
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="rememberMe" checked> Remember me
            </label>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="spinner" class="spinner"></div>
    <div class="info">Demo credentials: admin@sample.com / admin123</div>
</div>

<script>
    // If already authenticated, redirect to dashboard
    const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
    if (token) {
        window.location.replace('/admin/dashboard');
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const spinner = document.getElementById('spinner');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const shouldRemember = document.getElementById('rememberMe').checked;

        errorMessage.style.display = 'none';
        spinner.classList.add('active');

        try {
            const response = await fetch('/api/auth/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (data.success) {
                const token = data.token;
                const adminInfo = JSON.stringify(data.admin);
                if (shouldRemember) {
                    localStorage.setItem('adminToken', token);
                    localStorage.setItem('adminInfo', adminInfo);
                } else {
                    sessionStorage.setItem('adminToken', token);
                    sessionStorage.setItem('adminInfo', adminInfo);
                }
                window.location.replace('/admin/dashboard');
            } else {
                errorMessage.textContent = data.error || 'Invalid credentials';
                errorMessage.style.display = 'block';
            }
        } catch (err) {
            errorMessage.textContent = 'Network error. Please try again.';
            errorMessage.style.display = 'block';
        } finally {
            spinner.classList.remove('active');
        }
    });
</script>
</body>
</html>
