<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Booking System</title>
    <!-- Login‑specific styles (restores gradient background) -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 1rem 2rem rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            color: #333;
            font-size: 28px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            margin: 0;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #5a67d8;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            display: none;
        }
        .info {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 12px;
            color: #666;
        }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }
        .spinner.active {
            display: block;
        }
        .spinner::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <!-- Optional external CSS for any extra shared styles (kept for consistency) -->
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>Booking System</h1>
        <p>Admin Portal</p>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="admin@sample.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter your password">
        </div>
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="rememberMe" checked> Remember me
            </label>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="spinner" class="spinner"></div>
    <div class="info">Demo credentials: admin@sample.com / admin123</div>
</div>

<script>
    // If already authenticated, redirect to dashboard
    const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
    if (token) {
        window.location.replace('/admin/dashboard');
    }

    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const spinner = document.getElementById('spinner');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const shouldRemember = document.getElementById('rememberMe').checked;

        errorMessage.style.display = 'none';
        spinner.classList.add('active');

        try {
            const response = await fetch('/api/auth/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (data.success) {
                const token = data.token;
                const adminInfo = JSON.stringify(data.admin);
                if (shouldRemember) {
                    localStorage.setItem('adminToken', token);
                    localStorage.setItem('adminInfo', adminInfo);
                } else {
                    sessionStorage.setItem('adminToken', token);
                    sessionStorage.setItem('adminInfo', adminInfo);
                }
                window.location.replace('/admin/dashboard');
            } else {
                errorMessage.textContent = data.error || 'Invalid credentials';
                errorMessage.style.display = 'block';
            }
        } catch (err) {
            errorMessage.textContent = 'Network error. Please try again.';
            errorMessage.style.display = 'block';
        } finally {
            spinner.classList.remove('active');
        }
    });
</script>
</body>
</html>
